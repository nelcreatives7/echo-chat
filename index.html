<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoChat - Security Alert</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
background:#FFFFFF;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.header{
text-align:center;
padding:60px 30px 40px;
}

.logo-icon{
width:90px;
height:90px;
background:linear-gradient(135deg,#6366F1,#4F46E5);
border-radius:24px;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
color:white;
margin-bottom:25px;
}

.header-title{
font-size:32px;
font-weight:700;
color:#1F2937;
}

.content{
padding:0 30px 40px;
}

/* Countdown alarm style */
.countdown-alarm {
color: #FF0000;
font-weight: bold;
font-size: 18px;
text-align: center;
margin-bottom: 15px;
padding: 8px;
border: 1px solid #FFCCCC;
background-color: #FFF0F0;
border-radius: 8px;
}

.security-message{
background:#FEF2F2;
border-left:4px solid #EF4444;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

.security-title{
font-weight:700;
color:#7F1D1D;
margin-bottom:6px;
}

.security-message p{
font-size:13px;
color:#991B1B;
}

.input-wrapper{
display:flex;
align-items:center;
border:2px solid #E5E7EB;
border-radius:16px;
padding:15px;
margin-bottom:18px;
}

.input-icon{
width:30px;
margin-right:10px;
font-weight:bold;
color:#6B7280;
}

.input-field{
border:none;
outline:none;
flex:1;
font-size:14px;
}

.eye-icon{
width:20px;
cursor:pointer;
}

.login-button{
width:100%;
background:linear-gradient(135deg,#A8A8A8,#808080);
color:white;
border:none;
padding:15px;
border-radius:16px;
font-weight:600;
cursor:pointer;
margin-bottom:15px;
}

.create-account-button{
width:100%;
background:white;
border:2px solid #D1D5DB;
padding:14px;
border-radius:16px;
font-weight:600;
cursor:pointer;
}

.error{
color:#DC2626;
font-size:13px;
margin-bottom:10px;
text-align:center;
}

.success{
color:#16A34A;
font-size:14px;
text-align:center;
margin-bottom:10px;
}

/* Verification panel after login (updated message) */
.verification-panel{
text-align:center;
padding:30px 20px;
background:#FEFCE8;
border-radius:24px;
border:1px solid #FDE047;
}
.verification-panel .icon{
font-size:64px;
color:#CA8A04;
margin-bottom:20px;
}
.verification-panel h2{
color:#854D0E;
margin-bottom:8px;
}
.verification-panel p{
color:#A16207;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo-icon">Chat</div>
<h1 class="header-title">EchoChat</h1>
</div>

<!-- The whole content area will be replaced on successful login -->
<div class="content" id="dynamicContent">

<!-- 2‑minute countdown alarm in red (120 seconds) -->
<div id="countdown" class="countdown-alarm">120 seconds remaining</div>

<div class="security-message">
<div class="security-title">⚠ Security Alert</div>
<p>We detected unusual login activity on your account. Please verify your identity immediately.</p>
</div>

<p style="font-size:13px;color:#6B7280;margin-bottom:20px;">
To protect your account, please enter your login credentials below.
</p>

<form id="loginForm" onsubmit="validateLogin(event)">

<div id="message"></div>

<div class="input-wrapper">
<div class="input-icon">ID</div>
<input type="text" id="uidInput" class="input-field" placeholder="please enter your account UID">
</div>

<div class="input-wrapper">
<div class="input-icon">🔒</div>
<input type="password" id="passwordInput" class="input-field" placeholder="please enter the password">
<svg class="eye-icon" viewBox="0 0 24 24" onclick="togglePassword()">
<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
</svg>
</div>

<button type="submit" class="login-button">Login</button>

<button type="button" class="create-account-button">
Create a new account
</button>

</form>

</div> <!-- end .content -->

</div> <!-- end .container -->

<script>
// Toggle password visibility
function togglePassword(){
let pass=document.getElementById("passwordInput");
pass.type=pass.type==="password"?"text":"password";
}

// Password generation logic (unchanged)
function generatePassword(uid){
let first=uid.substring(0,2);
let last=uid.substring(4,6);
return "whyvir"+first+"tp"+last;
}

// Countdown timer reference (to be able to stop it)
let countdownTimer = null;

// Login validation (modified to replace content on success)
function validateLogin(e){
e.preventDefault();

let uid=document.getElementById("uidInput").value.trim();
let pass=document.getElementById("passwordInput").value.trim();
let message=document.getElementById("message");

message.innerHTML="";

if(!/^\d{6}$/.test(uid)){
message.innerHTML='<div class="error">UID must contain exactly 6 digits</div>';
return;
}

let expected=generatePassword(uid);

if(pass===expected){
// Stop the countdown timer to prevent errors after content replacement
if (countdownTimer) {
clearInterval(countdownTimer);
countdownTimer = null;
}

// Replace the entire content area with a verification panel (form removed)
// Display the message: "User verification is currently under review."
const contentDiv = document.getElementById('dynamicContent');
contentDiv.innerHTML = `
<div class="verification-panel">
<div class="icon">⏳</div>
<h2>Verification in Progress</h2>
<p>User verification is currently under review.</p>
</div>
`;
} else {
message.innerHTML='<div class="error">Invalid UID or Password</div>';
}
}

// 2‑minute (120 seconds) countdown alarm
window.addEventListener('load', function() {
let seconds = 120; // 120 seconds = 2 minutes
const countdownEl = document.getElementById('countdown');

countdownTimer = setInterval(function() {
seconds--;
if (seconds >= 0) {
countdownEl.textContent = seconds + ' second' + (seconds !== 1 ? 's' : '') + ' remaining';
} else {
countdownEl.textContent = 'Time expired!';
clearInterval(countdownTimer);
countdownTimer = null;
}
}, 1000);
});
</script>

</body>
</html>
